<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ライブ配信ガイド | ONECARAT</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .phone-container {
            height: 100vh;
            height: 100dvh; 
            position: relative;
            background-color: #fff;
        }

        /* --- アニメーション定義 --- */
        @keyframes title-reveal {
            0% { transform: translateY(20px); opacity: 0; filter: blur(10px); }
            100% { transform: translateY(0); opacity: 1; filter: blur(0); }
        }
        .animate-title-reveal {
            animation: title-reveal 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
        }

        /* --- バウンスアニメーションの追加 --- */
        @keyframes bounce-in {
            0% { transform: translateY(-50px) scale(0.3); opacity: 0; }
            50% { transform: translateY(10px) scale(1.1); opacity: 1; }
            70% { transform: translateY(-5px) scale(0.98); }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        .animate-bounce-in {
            animation: bounce-in 1.2s cubic-bezier(0.36, 0.45, 0.63, 1) forwards;
            opacity: 0;
            will-change: transform, opacity; /* パフォーマンス向上のため */
        }

        @keyframes bounce-in {
            0% { transform: translateY(-50px) scale(0.3); opacity: 0; }
            50% { transform: translateY(10px) scale(1.1); opacity: 1; }
            70% { transform: translateY(-5px) scale(0.98); }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        .animate-bounce-in {
            animation: bounce-in 1.2s cubic-bezier(0.36, 0.45, 0.63, 1) forwards;
            opacity: 0;
        }

        @keyframes soft-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }
        .animate-soft-pulse {
            animation: soft-pulse 3s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes float-heart {
            0% { transform: translateY(0) scale(0.2) rotate(0deg); opacity: 0; }
            15% { transform: translateY(-20px) scale(1) rotate(calc(var(--tilt) * 0.2)); opacity: 1; }
            80% { opacity: 0.8; }
            100% { transform: translateY(-320px) scale(1) rotate(var(--tilt)); opacity: 0; }
        }
        .animate-heart {
            animation-name: float-heart;
            animation-timing-function: cubic-bezier(0.4, 0, 1, 1);
            animation-fill-mode: forwards;
        }

        @keyframes comment-in {
            0% { transform: translateY(15px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .animate-comment-in {
            animation: comment-in 0.4s ease-out forwards;
        }

        @keyframes tap-attention {
            0%, 100% { transform: scale(1); box-shadow: 0 0 15px rgba(255,255,255,0.3); }
            50% { transform: scale(1.03); box-shadow: 0 0 25px rgba(255,255,255,0.5); }
        }
        .animate-tap-attention {
            animation: tap-attention 1.5s infinite ease-in-out;
        }

        @keyframes slide-up {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up {
            animation: slide-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* シマー効果（光るアニメーション）の追加 */
        @keyframes shimmer {
            0% { transform: translateX(-150%) skewX(-20deg); }
            100% { transform: translateX(250%) skewX(-20deg); }
        }
        .animate-shimmer {
            animation: shimmer 2.5s infinite ease-in-out;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        
        .page-transition {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sticky-banner-active {
            animation: banner-pulse 2s infinite ease-in-out;
        }
        @keyframes banner-pulse {
            0% { transform: scale(1); box-shadow: 0 10px 25px -5px rgba(6, 199, 85, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 15px 30px -5px rgba(6, 199, 85, 0.6); }
            100% { transform: scale(1); box-shadow: 0 10px 25px -5px rgba(6, 199, 85, 0.4); }
        }

        .progress-container {
            position: absolute;
            top: 16px;
            left: 50px;
            right: 50px;
            display: flex;
            gap: 4px;
            z-index: 50;
        }
        .progress-bar {
            height: 1.5px;
            background: rgba(255,255,255,0.15);
            border-radius: 99px;
            flex: 1;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: rgba(255,255,255,0.6);
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const LINE_URL = "https://lin.ee/U4NCFuX";

        // --- データ定義 ---
        const USERS = ["rina_08", "m_chan", "yuki_22", "ken_ken", "misa_misa", "night_sky", "takaaki_sea", "daiki", "sora", "nana_77", "michel", "kenta_33"];
        const TEXTS = ["ライバー事務所探してました！ ✨", "憧れる！配信したい！ 😍", "ONCARATすごそう 💎", "夢があるなぁ… 🌈", "ライバー募集してるの？ 🤔", "初心者だけど大丈夫かな？ 🔰", "稼ぎたい！ 💰", "ライブ配信について知りたい！ 📱", "どんな世界なんだろ？ ✨", "人気になれるかな… 😖"];
        const COMMENT_COLORS = ["text-rose-500", "text-amber-500", "text-sky-500", "text-emerald-500", "text-orange-500", "text-purple-500", "text-pink-500"];
        const HEART_COLORS = ["text-rose-400", "text-pink-400", "text-red-400", "text-orange-400", "text-yellow-400", "text-purple-400", "text-sky-400", "text-emerald-400"];

        const OnecaratFallbackLogo = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 3L3 8L12 22L21 8L18 3H6Z" fill="#7ed7d1" />
                <path d="M6 3L12 8L18 3M3 8L12 8L21 8M12 22L9 8M12 22L15 8" stroke="white" strokeWidth="0.5" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
        );

        const Icon = ({ name, color = "currentColor", size = 24, fill = "none", className = "" }) => {
            const icons = {
                Smartphone: <path d="M17 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2ZM12 18h.01"/>,
                MessageCircle: <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/>,
                UserCircle: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/></>,
                TrendingUp: <><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></>,
                Heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>,
                ChevronRight: <polyline points="9 18 15 12 9 6"/>,
                ChevronLeft: <polyline points="15 18 9 12 15 6"/>,
                Camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>,
                Ghost: <path d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8Z"/>,
                Globe: <><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></>,
                Gift: <><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></>,
                Percent: <><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/><line x1="19" y1="5" x2="5" y2="19"/></>,
                Clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
                Trophy: <><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-2.34"/><path d="M12 2v12.66"/></>,
                Medal: <><path d="M7.21 15 2.66 7.14a2 2 0 0 1 .13-2.2L4.4 2.8A2 2 0 0 1 6 2h12a2 2 0 0 1 1.6.8l1.6 2.14a2 2 0 0 1 .14 2.2L16.79 15"/><circle cx="12" cy="15" r="7"/><circle cx="12" cy="15" r="3"/><path d="M12 18v-6"/><path d="M10 13h1"/></>,
                Star: <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>,
                Zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
                AlertCircle: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState(0);
            const [comments, setComments] = useState([]);
            const [hearts, setHearts] = useState([]);
            const [imgError, setImgError] = useState(false);
            const [showFinalPopup, setShowFinalPopup] = useState(false);
            // ポップアップを一度閉じたことを示すフラグ
            const [popupDismissed, setPopupDismissed] = useState(false);
            
            const nextTextIndex = useRef(0);
            const scrollContainerRef = useRef(null); 
            const triggerRef = useRef(null);
            const videoRef = useRef(null);

            useEffect(() => {
                if (scrollContainerRef.current) {
                    scrollContainerRef.current.scrollTop = 0;
                }
                setShowFinalPopup(false);
                setPopupDismissed(false); // ページ切り替え時にフラグをリセット

                // 表紙（0ページ目）に切り替わった時、動画を再生する処理を追加
                if (currentPage === 0 && videoRef.current) {
                    videoRef.current.play().catch(e => console.log("再生ブロック対策"));
                }
            }, [currentPage]);

            // 15秒経過タイマー (最初の表示用)
            useEffect(() => {
                let timer;
                if (currentPage === 6 && !showFinalPopup && !popupDismissed) {
                    timer = setTimeout(() => {
                        setShowFinalPopup(true);
                    }, 15000);
                }
                return () => clearTimeout(timer);
            }, [currentPage, showFinalPopup, popupDismissed]);

            // スクロール監視
            const handleScroll = () => {
                if (currentPage !== 6 || !scrollContainerRef.current) return;
                
                const container = scrollContainerRef.current;
                const scrollPosition = container.scrollTop + container.clientHeight;
                const totalHeight = container.scrollHeight;
                
                // 「一番下」に到達したか判定
                const isBottom = totalHeight - scrollPosition <= 10; // 誤差を考慮して10px
                 
                // --- 追加：一番下から少し上にスクロール戻したら「閉じた記録」をリセット ---
                if (!isBottom) {
                    setPopupDismissed(false);
                }
                
                // ポップアップを表示する条件
                // 1. 一番下である 2. 現在表示されていない 3. まだDismiss（拒否）状態でない
                if (isBottom && !showFinalPopup && !popupDismissed) {
                    setShowFinalPopup(true);
                }
            };

            const generateNextComment = (currentComments) => {
                const text = TEXTS[nextTextIndex.current];
                nextTextIndex.current = (nextTextIndex.current + 1) % TEXTS.length;
                const activeUserNames = currentComments.map(c => c.user);
                const availableUsers = USERS.filter(u => !activeUserNames.includes(u));
                const selectedUser = availableUsers.length > 0 ? availableUsers[Math.floor(Math.random() * availableUsers.length)] : USERS[Math.floor(Math.random() * USERS.length)];
                return { user: selectedUser, text, color: COMMENT_COLORS[Math.floor(Math.random() * COMMENT_COLORS.length)], id: Math.random() };
            };

            const generateHeart = () => ({
                id: Math.random(),
                x: Math.random() * 30 - 15,
                tilt: Math.random() * 80 - 40,
                color: HEART_COLORS[Math.floor(Math.random() * HEART_COLORS.length)],
                delay: Math.random() * 0.1,
                duration: 2.2 + Math.random() * 1.5 
            });

            useEffect(() => {
                let initial = [];
                for(let i=0; i<4; i++) initial.push(generateNextComment(initial));
                setComments(initial);
            }, []);

            useEffect(() => {
                if (currentPage !== 0) return;
                const commentTimer = setInterval(() => {
                    setComments(prev => [...prev.slice(1), generateNextComment(prev)]);
                }, 800);
                const heartTimer = setInterval(() => {
                    const heartCount = Math.floor(Math.random() * 3) + 1;
                    const newHearts = Array.from({ length: heartCount }).map(() => generateHeart());
                    setHearts(prev => [...prev.slice(-50), ...newHearts]); 
                }, 250);
                return () => { clearInterval(commentTimer); clearInterval(heartTimer); };
            }, [currentPage]);

            const pages = [
                // Page 0: 表紙
          // Page 0: 表紙
        {
            isCover: true,
            color: "from-pink-200 via-white to-sky-200",
            content: (
                <div className="h-full w-full relative flex flex-col pt-4 pb-4 px-4 overflow-hidden text-gray-800 text-left">
                    {/* ヘッダーの余白を少し縮小 */}
                    <div className="flex justify-between items-start z-30 shrink-0 mt-2 text-left">
                        <div className="flex items-center gap-2 bg-white/40 backdrop-blur-md p-1 rounded-full border border-white/60">
                            <div className="w-8 h-8 rounded-full bg-white flex items-center justify-center shadow-sm overflow-hidden shrink-0 text-left">
                                {!imgError ? (
                                    <img src="onecarat_logo.png" alt="ONECARAT Logo" className="w-full h-full object-contain p-1" onError={() => setImgError(true)} />
                                ) : (
                                    <OnecaratFallbackLogo size={20} />
                                )}
                            </div>
                            <div className="pr-4 text-left">
                                <p className="text-gray-800 text-[10px] font-bold leading-none mb-1 text-left">ONECARAT</p>
                                <p className="text-gray-500 text-[7px] font-bold leading-none tracking-tighter italic">12,000+ Members</p>
                            </div>
                            <div className="bg-rose-400 px-4 py-2 rounded-full text-white text-[8px] font-bold shadow-lg shrink-0">Follow</div>
                        </div>
                    </div>

                    {/* 背景動画 */}
                    <div className="absolute inset-0 z-10 opacity-70 pointer-events-none scale-110">
                        <video 
                        ref={videoRef}
                        src="ONCARAT-Liver-movie.mp4" 
                        autoPlay
                        loop
                        playsInline
                        muted
                        className="w-full h-full object-cover scale-105"
                        />
                    </div>

                    {/* 中央ロゴ：高さを mt-12 に抑え、サイズを w-[85%] に微調整して縦方向のスペースを確保 */}
                    <div className="flex-1 flex flex-col items-center justify-start z-20 px-4 text-center mt-20">
                        <img 
                            src="Live Streaming Guide.png" 
                            alt="ライブ配信ガイド ロゴ" 
                            className="w-[95%] max-w-[360px] h-auto object-contain animate-bounce-in" 
                            style={{ animationDelay: '0.1s' }}
                        />
                    </div>

                    {/* 下部コンテンツエリア */}
                    <div className="z-30 mt-auto flex flex-col space-y-3 text-left">
                        <div className="flex items-end justify-between pointer-events-none text-left">
                            {/* コメント欄の最小高さを 140px -> 120px に縮小 */}
                            <div className="flex flex-col gap-2 min-h-[120px] justify-end flex-1 text-left">
                                {comments.map((comment) => (
                                    <div key={comment.id} className="bg-white/90 backdrop-blur-md px-3 py-2 rounded-full border border-bg-white/90 shadow-sm animate-comment-in self-start max-w-[85%] text-left">
                                        <p className="text-gray-800 text-[11px] font-medium leading-none">
                                            <span className={`${comment.color} font-bold mr-1.5`}>{comment.user}</span>{comment.text}
                                        </p>
                                    </div>
                                ))}
                            </div>
                            <div className="relative w-12 h-32 shrink-0 overflow-visible text-left">
                                {hearts.map((heart) => (
                                    <div key={heart.id} className={`absolute bottom-0 left-[30%] ${heart.color} animate-heart`} style={{ marginLeft: `${heart.x}px`, animationDelay: `${heart.delay}s`, animationDuration: `${heart.duration}s`, '--tilt': `${heart.tilt}deg` }}>
                                        <Icon name="Heart" size={28} fill="currentColor" />
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* ボタン：高さを確保するために上下の余白(py)を微調整 */}
                        <div className="text-center w-full pb-2">
                            <div className="animate-tap-attention inline-block p-[2px] rounded-full bg-gradient-to-r from-blue-500 to-purple-600 shadow-2xl">
                                <div className="bg-white rounded-full">
                                    <div className="px-8 py-3 text-center">
                                        <p className="font-bold text-[11px] sm:text-sm tracking-[0.2em] uppercase bg-gradient-to-r from-blue-500 to-purple-600 bg-clip-text text-transparent">
                                            TAP TO NEXT PAGE
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="text-center w-full pt-0"><p className="text-gray-400 text-[9px] font-bold tracking-[0.1em] pl-[0.4em] text-center">Produce by ONECARAT</p></div>
                    </div>
                </div>
            )
        },

                // Page 1: ライブ配信って何？
                { 
                    title: "ライブ配信って何？", 
                    subtitle: "視聴者と「今」を共有するエンターテインメント！", 
                    color: "from-pink-500 to-rose-400", 
                    content: (
                        <div className="space-y-6 page-transition pb-8 text-left">
                            <div className="px-2 text-left">
                                <p className="text-gray-700 text-[13px] font-medium leading-relaxed text-justify text-left">「ライブ配信」という言葉、InstagramやTikTok, YouTubeなどで一度は見聞きしたことがあるはず。でも、「実際にどういったことをやるのか、自分に何ができるかまではイメージがわかない」という方も多いのではないでしょうか。</p>
                                <p className="text-gray-900 text-[13px] font-bold mt-4 leading-relaxed border-l-4 border-pink-400 pl-3 text-left">そんな方のために、<br />ライブ配信について分かりやすく解説します！</p>
                            </div>
                            <div className="space-y-4 text-left">
                                <h3 className="text-xs font-bold text-gray-400 tracking-widest uppercase pl-2 text-left">主な特徴</h3>
                                <div className="flex flex-col p-5 bg-white rounded-xl border border-gray-100 shadow-sm mb-4 text-left">
                                    <div className="flex items-center gap-3 mb-2 text-left">
                                        <div className="shrink-0 text-left "><Icon name="Smartphone" color="#f43f5e" size={28} /></div>
                                        <h4 className="font-bold text-sm text-gray-800 leading-none flex-1 text-left">「スマホ1台」で主役になれる！</h4>
                                    </div>
                                    <p className="text-[11px] text-gray-500 leading-relaxed pl-1 text-justify text-left">特別な機材や編集スキルは不要. スマホ1台あれば、自分の部屋やお出かけ先で気軽に世界へ発信することができます。編集された動画ではなく「今、この瞬間」をリアルタイムで届けられるのが最大の魅力です。</p>
                                </div>
                                <div className="flex flex-col p-5 bg-white rounded-xl border border-gray-100 shadow-sm mb-4 text-left">
                                    <div className="flex items-center gap-3 mb-2 text-left">
                                        <div className="shrink-0 text-left"><Icon name="MessageCircle" color="#3b82f6" size={28} /></div>
                                        <h4 className="font-bold text-sm text-gray-800 leading-none flex-1 text-left">視聴者と「会話」ができる！</h4>
                                    </div>
                                    <p className="text-[11px] text-gray-500 leading-relaxed pl-1 text-justify text-left">視聴者が送るコメントにその場で反応し、まるで友人のように会話を楽しむことができます。物理的な距離を超えて世界中の人と深く交流できるため、特別な才能がなくても、あなたの飾らない人柄に惹かれるファンが必ず見つかります。</p>
                                </div>
                                <div className="flex flex-col p-5 bg-white rounded-xl border border-gray-100 shadow-sm mb-4 text-left">
                                    <div className="flex items-center gap-3 mb-2 text-left">
                                        <div className="shrink-0 text-left"><Icon name="Globe" color="#a855f7" size={28} /></div>

            const page = pages[currentPage];
            const handleTap = (e) => {
                // 画面に触れた瞬間にミュートを解除して音を出す
                if (videoRef.current) {
                    videoRef.current.play().catch(() => {});
                }
                // 2. タップ位置の計算
                const rect = e.currentTarget.getBoundingClientRect();
                const tapX = e.clientX - rect.left;
                
                // 3. ページ移動の実行
                if (tapX < rect.width * 0.3) {
                    // 左側30%タップで戻る
                    setCurrentPage(prev => Math.max(0, prev - 1));
                } else if (currentPage < pages.length - 1) {
                    // それ以外で次へ進む
                    setCurrentPage(prev => prev + 1);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center text-left">
                    <div className="relative w-full max-w-[430px] phone-container bg-white shadow-2xl flex flex-col sm:rounded-xl overflow-hidden sm:my-4 cursor-pointer text-left" onClick={handleTap}>
                        {currentPage > 0 && <div className="progress-container text-left">{pages.map((_, i) => i > 0 && (<div key={i} className="progress-bar text-left"><div className="progress-fill text-left" style={{ width: i <= currentPage ? '100%' : '0%' }} /></div>))}</div>}
                        <div className={`${page.isCover ? 'flex-1' : 'pt-8 pb-4 px-8 bg-gradient-to-br'} ${page.color} relative transition-all duration-500 flex flex-col text-left`}>
                            {!page.isCover && <div className="page-transition text-white text-left"><h1 className="text-2xl font-bold leading-tight mb-1 drop-shadow-lg text-left">{page.title}</h1><p className="text-[12px] font-bold opacity-90 italic leading-snug whitespace-pre-line border-l-4 border-white/30 pl-3 text-left">{page.subtitle}</p></div>}
                            {page.isCover && page.content}
                        </div>
                        {!page.isCover && (
                            <div 
                                ref={scrollContainerRef} 
                                onScroll={handleScroll}
                                className="flex-1 overflow-y-auto px-8 pt-4 pb-20 bg-white custom-scrollbar text-left"
                            >
                                {page.content}
                            </div>
                        )}

                        {/* --- ポップアップセクション --- */}
                        {showFinalPopup && (
                            <div 
                                className="absolute inset-x-0 bottom-0 z-[100] bg-white shadow-[0_-10px_40px_rgba(0,0,0,0.15)] rounded-t-[2rem] animate-slide-up border-t border-gray-100 overflow-hidden"
                                onClick={(e) => e.stopPropagation()}
                            >
                                <div className="p-1 text-center bg-rose-500">
                                    <div className="w-10 h-1 bg-white/40 rounded-full mx-auto my-1"></div>
                                </div>
                                <div className="p-6 pt-5 custom-scrollbar max-h-[75vh] overflow-y-auto">
                                    <div className="mb-6 text-center">
                                        <h3 className="text-rose-600 font-bold text-[17px] leading-tight">
                                            🚨最重要🚨<br/>
                                            <span className="inline-block whitespace-nowrap mt-1">いきなり「配信スタート」はちょっと待って！</span>
                                        </h3>
                                    </div>
                                    <div className="text-[12px] text-gray-700 leading-relaxed text-justify mb-6 space-y-4">
                                        <p>実は、多くのライブ配信アプリには<span className="font-bold text-rose-600 underline decoration-rose-200 decoration-2">「初心者を優遇する制度（ビギナー枠など）」が存在します。これは、始めたての一定期間だけ、アプリ側があなたの配信を優先的におすすめ表示してくれる“ボーナタイム”</span>です。</p>
                                        <p>事前の知識がないまま「なんとなく」でスタートしてしまうと、この最もファンを獲得しやすい貴重なチャンスを無駄にしてしまう可能性が非常に高いのです。まずはライバー事務所に相談し、選んだアプリが本当にあなたに最適か答え合わせをし、戦略的なデビューのタイミングを整えることが成功への一番の近道です。</p>
                                    </div>

                                    <div className="bg-green-50 rounded-xl p-5 border border-green-100 shadow-sm">
                                        <h4 className="text-green-700 font-bold text-sm mb-3 flex items-center justify-center gap-2 text-center">
                                            <span>🎁 ライブ配信についてもっと知りたい方へ</span>
                                        </h4>
                                        <p className="text-[11px] text-gray-600 leading-relaxed mb-5 text-justify text-left">
                                            「もっと詳しく話を聞いてみたい！」「安心・安全に、最短で収益化を目指したい！」という方は、ぜひONECARATの公式LINEまでお気軽にお問い合わせください！<br/>
                                            <br/>専門のスタッフが、あなたの目標やライフスタイルに合わせた最適な配信プランを無料でアドバイスさせていただきます。まずは一緒に、どう進めるのがベストか検討してみましょう！
                                        </p>
                                        <a href={LINE_URL} className="relative overflow-hidden w-full bg-[#06C755] text-white py-4 px-4 rounded-xl shadow-xl flex items-center justify-center gap-4 transition-transform active:scale-95 text-left">
                                            {/* シマー（光るスパン）効果 */}
                                            <div className="absolute top-0 left-0 w-1/3 h-full bg-gradient-to-r from-transparent via-white/50 to-transparent animate-shimmer" style={{ pointerEvents: 'none' }}></div>
                                            <Icon name="MessageCircle" size={24} color="white" fill="white" />
                                            <span className="font-bold text-[15px] relative z-10">公式LINEで無料相談する</span>
                                        </a>
                                    </div>
                                    
                                    <div className="mt-8 mb-6 relative text-center">
                                        {/* キャラクター画像を配置。枠線の上に重なるように */}
                                        <img 
                                            src="コスモくん.png" /* キャラクターの画像ファイル名 */
                                            alt="コスモくん" 
                                            className="absolute bottom-[-15px] left-[-5px] h-[130px] w-auto object-contain z-[110] transform transition-transform hover:scale-105"
                                            style={{ pointerEvents: 'none' }} /* 画像がボタン操作を邪魔しないように */
                                        />
                                        
                                        {/* 「とじる」ボタン */}
                                        <button 
                                            onClick={() => {
                                                setShowFinalPopup(false);
                                                setPopupDismissed(true); // ポップアップを閉じたことを記録
                                            }}
                                            className="w-full text-gray-400 text-[10px] font-bold hover:text-gray-600 py-3 text-center transition-colors"
                                        >
                                            とじる
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {!page.isCover && !showFinalPopup && (
                            <div className="absolute bottom-5 left-6 right-6 z-50 flex justify-center">
                                <a 
                                    href={LINE_URL} 
                                    onClick={(e) => e.stopPropagation()} 
                                    className="w-full bg-[#06C755] text-white py-4 px-6 rounded-xl shadow-[0_10px_30px_-5px_rgba(6,199,85,0.5)] flex items-center justify-between sticky-banner-active overflow-hidden relative border-none"
                                >
                                    {/* シマー効果 */}
                                    <div className="absolute top-0 left-0 w-1/3 h-full bg-gradient-to-r from-transparent via-white/30 to-transparent animate-shimmer" style={{ pointerEvents: 'none' }}></div>
                                    
                                    {/* 左側：LINEアイコンとテキスト */}
                                    <div className="flex items-center gap-3 relative z-10">
                                        {/* 背景(bg-xxx)を削除しました */}
                                        <div className="flex items-center justify-center">
                                            <Icon name="MessageCircle" size={24} color="white" fill="white" />
                                        </div>
                                        <div className="flex flex-col">
                                            <span className="text-[14px] font-bold tracking-tight leading-tight">ライブ配信するならONECARAT！</span>
                                            <span className="text-[10px] opacity-90 font-bold tracking-wide">公式LINEでお問い合わせ</span>
                                        </div>
                                    </div>
                                    
                                    {/* 右側：矢印アイコン。こちらも背景を削除しました */}
                                    <div className="relative z-10 flex items-center justify-center">
                                        <Icon name="ChevronRight" size={20} color="white" />
                                    </div>
                                </a>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
